<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wildest Dreams — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04030a;
      color: rgba(200,200,220,0.7);
      font-family: system-ui, sans-serif;
      font-weight: 200;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(123,94,167,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(78,205,196,0.06) 0%, transparent 60%);
    }
    .moon { font-size: 56px; margin-bottom: 32px; animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    h1 {
      font-size: 28px; font-weight: 300; font-style: italic;
      color: #f0ecff; margin-bottom: 16px; line-height: 1.2;
      font-family: Georgia, serif;
    }
    p { font-size: 14px; line-height: 1.9; color: rgba(200,200,220,0.4); margin-bottom: 40px; }
    .btn {
      padding: 14px 36px;
      border: 1px solid rgba(199,125,255,0.4);
      background: rgba(199,125,255,0.08);
      color: rgba(199,125,255,0.8);
      font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
      text-decoration: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="moon">🌙</div>
  <h1>You're in the dream world now.</h1>
  <p>No internet connection detected.<br>Your dreams are still safe — they'll sync when you're back online.</p>
  <a class="btn" href="/" onclick="location.reload()">Try Again</a>
</body>
</html>
